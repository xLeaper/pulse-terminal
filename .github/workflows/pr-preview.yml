name: PR preview Space

# Spawns a temporary HF Space per PR, mirrors the PR branch into it, and
# comments the preview URL on the PR. Cleans up when the PR is closed.
#
# WHY THIS EXISTS:
# Hugging Face Spaces have no built-in concept of branch deploys. The only
# way to preview an alternate version is to push to a separate Space. This
# workflow automates that lifecycle: open → preview, close → delete.
#
# REQUIREMENTS:
#   - HF_TOKEN secret (write scope)
#   - HF_USERNAME env value below
#   - The HF account must allow programmatic Space creation (default: yes)

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  HF_USERNAME: YOUR_HF_USERNAME           # ← change this once
  PREVIEW_SLUG_PREFIX: pulse-terminal-pr  # final slug becomes pulse-terminal-pr-{number}

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python (for huggingface_hub CLI)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install huggingface_hub
        run: pip install --quiet huggingface_hub

      - name: Compute preview slug
        id: slug
        run: echo "name=${{ env.PREVIEW_SLUG_PREFIX }}-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Create or get the preview Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi, RepoUrl
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = f'{os.environ["HF_USERNAME"]}/${{ steps.slug.outputs.name }}'
          try:
              api.create_repo(
                  repo_id=repo_id,
                  repo_type="space",
                  space_sdk="docker",
                  private=False,
                  exist_ok=True,
              )
              print(f"OK: {repo_id}")
          except Exception as e:
              print(f"create_repo: {e}")
              raise
          PY

      - name: Push PR branch to preview Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${{ steps.slug.outputs.name }}" \
            HEAD:main

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://huggingface.co/spaces/${process.env.HF_USERNAME}/${{ steps.slug.outputs.name }}`;
            const directUrl = `https://${process.env.HF_USERNAME}-${{ steps.slug.outputs.name }}.hf.space`;
            const body = [
              "### 🟡 Preview Space deployed",
              "",
              `**Space:** ${url}`,
              `**Direct URL:** ${directUrl}`,
              "",
              "_HF takes 3–6 minutes to build. The link will 404 until then._",
              "_The preview is destroyed when this PR closes._",
            ].join("\n");
            // Update existing comment if one exists, otherwise create.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes("Preview Space deployed"));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }
        env:
          HF_USERNAME: ${{ env.HF_USERNAME }}

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install huggingface_hub
        run: pip install --quiet huggingface_hub

      - name: Delete preview Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          slug = f'${{ env.PREVIEW_SLUG_PREFIX }}-${{ github.event.pull_request.number }}'
          repo_id = f'{os.environ["HF_USERNAME"]}/{slug}'
          try:
              api.delete_repo(repo_id=repo_id, repo_type="space")
              print(f"Deleted {repo_id}")
          except Exception as e:
              print(f"delete_repo (non-fatal): {e}")
          PY
