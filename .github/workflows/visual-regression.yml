name: Visual regression

# Runs on every PR. Builds the app, captures 27 screenshots
# (3 viewports × 9 surfaces), diffs against committed baselines.
# Fails if any surface drifted >0.5% pixels. Diffs are uploaded as
# artifacts for review.

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  visual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build snapshot + Next
        run: |
          node scripts/build-snapshot.mjs
          npm run build

      - name: Start server
        run: |
          npm start &
          echo $! > .server.pid
          for i in {1..40}; do
            if curl -sf http://localhost:3000 >/dev/null; then break; fi
            sleep 1
          done

      - name: Capture screenshots
        env:
          BASE_URL: http://localhost:3000
        run: npm run qa:screenshots

      - name: Stop server
        if: always()
        run: |
          if [ -f .server.pid ]; then kill "$(cat .server.pid)" || true; fi

      - name: Diff against baseline
        id: diff
        run: npm run qa:visual-diff

      - name: Upload diffs (only on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            screenshots/diff/
            screenshots/desktop-*.png
            screenshots/tablet-*.png
            screenshots/mobile-*.png
          retention-days: 14

      - name: Comment summary on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "## ⚠ Visual regression detected",
                "",
                "One or more surfaces drifted from the baseline by more than 0.5% pixels.",
                "",
                "**To review:** download the `visual-diffs` artifact from this run. Pink overlays show the changed regions.",
                "",
                "**To accept the new look:** locally run",
                "```",
                "UPDATE_BASELINE=1 npm run qa:visual-diff",
                "```",
                "then commit `screenshots/baseline/`."
              ].join("\n")
            });
