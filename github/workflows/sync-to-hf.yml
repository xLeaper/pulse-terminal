name: Sync to Hugging Face Space

# Mirror this repo's main branch to the Hugging Face Space on every push.
# HF then detects the push, rebuilds the Docker image, and redeploys.
#
# One-time setup (see SETUP-AUTOMATION.md for details):
#   1. Create the HF Space (Docker SDK).
#   2. Generate an HF write-token at https://huggingface.co/settings/tokens.
#   3. Add it to GitHub repo → Settings → Secrets → Actions → "New secret":
#      Name:  HF_TOKEN
#      Value: <the token starting with hf_…>
#   4. Set HF_USERNAME and HF_SPACE in the env block below.

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      HF_USERNAME: YOUR_HF_USERNAME      # e.g. "kevinly"
      HF_SPACE:    pulse-terminal        # the space slug, must already exist on HF

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Sanity build (catches broken pushes before they hit HF)
        run: |
          npm ci
          node scripts/build-snapshot.mjs
          npm run build

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Force-push so HF mirrors GitHub's history exactly. The HF Space
          # repo is treated as a deploy target, not a parallel source of truth.
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" \
            HEAD:main
